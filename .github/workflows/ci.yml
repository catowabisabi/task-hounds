name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  backend:
    name: Backend unit tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          pip install pytest httpx
      - name: Run unit tests
        # v1 scope: environment-independent tests only. The full suite in
        # docs/testing/tests also contains integration tests that need a
        # live managed OpenCode runtime (reachable 127.0.0.1 server,
        # oh-my-openagent agents); those are excluded until CI can
        # provision that runtime.
        env:
          PYTHONPATH: core
        run: |
          python -m pytest \
            docs/testing/tests/test_smoke_quickstart.py \
            docs/testing/tests/test_wave_p7_easy_compat.py \
            docs/testing/tests/test_api_request_guard.py \
            -q

  frontend:
    name: Frontend build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ui/web
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: ui/web/package-lock.json
      - name: Install dependencies
        run: npm ci
      - name: Build dashboard
        run: npm run build

  public-safety:
    name: Public safety scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Reject private runtime and database artifacts
        shell: bash
        run: |
          forbidden="$(find . -type f \( \
            -name '*.db' -o -name '*.sqlite' -o -name '*.sqlite3' -o \
            -name '.env' -o -name '*.pem' -o -name '*.key' -o \
            -name '*.log' \
          \) -not -path './.git/*' -print)"
          if [ -n "$forbidden" ]; then
            printf 'Forbidden public artifacts:\n%s\n' "$forbidden"
            exit 1
          fi
          test ! -d audit_migration
          test ! -d mcp
          test ! -d core/db/rebuild_db
